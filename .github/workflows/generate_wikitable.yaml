name: Generate Wikitable

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r soulframe/requirements.txt

      - name: Read sheet URL from config
        id: config
        run: |
          url=$(grep 'sheet_url' soulframe/config.yaml | sed 's/.*"\(.*\)"/\1/')
          echo "sheet_url=$url" >> $GITHUB_OUTPUT

      - name: Set timestamp
        id: ts
        run: echo "value=$(date -u +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT

      - name: Generate wikitable
        run: python soulframe/src/sf_qna_quick_convert.py "${{ steps.config.outputs.sheet_url }}" output-${{ steps.ts.outputs.value }}.txt

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: wikitable-output-${{ steps.ts.outputs.value }}
          path: output-${{ steps.ts.outputs.value }}.txt
