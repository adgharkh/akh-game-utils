name: Smoke Test

on: [push]

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r soulframe/requirements.txt

      - name: Smoke test
        run: python soulframe/src/sf_qna_quick_convert.py --help
