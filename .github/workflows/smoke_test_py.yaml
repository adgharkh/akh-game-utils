name: Smoke Test

on: [push]

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run script (dry run)
        run: |
          python soulframe/src/sf_qna_quick_convert.py --help 